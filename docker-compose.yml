version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: piaget-sql
    environment:
      SA_PASSWORD: "SenhaForte@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - piaget_sql_data:/var/opt/mssql
    restart: unless-stopped

  api:
    build: .
    container_name: piaget-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=ApiPiagetDocker;User Id=sa;Password=SenhaForte@123;TrustServerCertificate=True;MultipleActiveResultSets=true;
    depends_on:
      - db
    restart: unless-stopped

volumes:
  piaget_sql_data: